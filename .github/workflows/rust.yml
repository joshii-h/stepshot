name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: linux · fmt · clippy · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --release --locked

      - name: Test
        run: cargo test --locked

  windows:
    name: windows · clippy · build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Compiles the cfg(windows) backend (hook / PrintWindow / UIA / tray).
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --release --locked

# Note: GitHub runners have no KWin/Wayland/AT-SPI (Linux) nor a desktop session
# wired for the tray (Windows), so runtime behavior — screenshots, element
# detection, tray — can only be verified locally. CI covers formatting, lints,
# and that every backend compiles on its target OS.

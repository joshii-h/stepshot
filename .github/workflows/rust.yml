name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --release --locked

      - name: Test
        run: cargo test --locked

# Note: GitHub runners have no KWin/Wayland/AT-SPI, so the runtime behavior
# (screenshots, element detection, tray) can only be verified locally.
# This workflow covers formatting, lints, and that everything compiles.
